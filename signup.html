<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Virtual Lab</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-body">
    <main class="auth-container">
      <section class="glass-card p-4 p-md-5 auth-card" style="max-width: 560px">
        <div class="text-center mb-4">
          <i class="bi bi-person-plus-fill fs-2 text-primary"></i>
          <h1 class="h3 mt-2 mb-1">Create Researcher Account</h1>
          <p class="text-secondary mb-0">Register to access virtual laboratory resources</p>
        </div>

        <form id="signupForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Username / Email</label>
              <input type="text" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirm Password</label>
              <input id="confirmPassword" type="password" class="form-control" required />
            </div>
            <div class="col-12">
              <label class="form-label">Role</label>
              <select class="form-select" required>
                <option value="researcher">Researcher / User</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-gradient w-100 mt-4 py-2">Register</button>
        </form>

        <p class="text-center mt-3 mb-0">
          Already have an account?
          <a href="login.html" class="text-primary text-decoration-none fw-semibold">Login</a>
        </p>
      </section>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
