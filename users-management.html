<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Management | Virtual Lab</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="container-fluid">
        <div class="topbar p-3 mb-3 d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0">User Management Panel</h1>
          <div class="d-flex gap-2">
            <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#userModal">
              <i class="bi bi-person-plus me-1"></i>New User
            </button>
            <a href="dashboard-admin.html" class="btn btn-outline-primary btn-outline-soft">Back</a>
          </div>
        </div>

        <div class="table-wrapper">
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>userID</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Phone</th>
                  <th>Password</th>
                  <th>Role</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>U-1001</td>
                  <td>Sarah</td>
                  <td>Ahmed</td>
                  <td>+20 100 000 0000</td>
                  <td>******</td>
                  <td><span class="badge text-bg-primary">researcher</span></td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary btn-outline-soft" data-bs-toggle="modal" data-bs-target="#userModal">Edit</button>
                    <button class="btn btn-sm btn-outline-danger btn-outline-soft">Delete</button>
                  </td>
                </tr>
                <tr>
                  <td>U-0001</td>
                  <td>Lab</td>
                  <td>Admin</td>
                  <td>+20 122 222 2222</td>
                  <td>******</td>
                  <td><span class="badge text-bg-dark">admin</span></td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary btn-outline-soft" data-bs-toggle="modal" data-bs-target="#userModal">Edit</button>
                    <button class="btn btn-sm btn-outline-danger btn-outline-soft">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Add / Edit User</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-6"><input class="form-control" placeholder="First name" /></div>
              <div class="col-6"><input class="form-control" placeholder="Last name" /></div>
              <div class="col-6"><input class="form-control" placeholder="Phone number" /></div>
              <div class="col-6"><input class="form-control" placeholder="Password" /></div>
              <div class="col-12">
                <select class="form-select">
                  <option>researcher</option>
                  <option>admin</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline-secondary btn-outline-soft" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-gradient">Save User</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
