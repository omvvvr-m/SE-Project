<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Virtual Lab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="container">
      <div class="topbar p-3 mb-3 d-flex justify-content-between align-items-center">
        <h1 class="h4 mb-0">Profile Page</h1>
        <a href="dashboard-user.html" data-back-dashboard class="btn btn-outline-primary btn-outline-soft">Back to
          Dashboard</a>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card-soft p-4 text-center h-100">
            <div class="profile-avatar mx-auto mb-3">
              <i class="bi bi-person"></i>
            </div>
            <h2 class="fullName h5 mb-1">Dr. Sarah Ahmed</h2>
            <p class="text-secondary mb-2">Researcher</p>
            <button id="editProfileBtn" class="btn btn-gradient btn-sm px-4">Edit Profile</button>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card-soft p-4 mb-3">
            <h2 class="h5 mb-3">Account Information</h2>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input class="fullName form-control profile-editable" value="Dr. Sarsah Ahmed" disabled />
              </div>
              <div class="col-md-6">
                <label class=" form-label">Phone Number</label>
                <input class="phoneNumber form-control profile-editable" value="+20 100 000 0000" disabled />
              </div>
              <div class="col-md-6">
                <label class="form-label">Role</label>
                <input class="role form-control profile-editable" value="Researcher" disabled />
              </div>
              <div class="col-md-6">
                <label class="form-label">User ID</label>
                <input class="userID form-control profile-editable" value="U-1024" disabled />
              </div>
            </div>
          </div>

          <div class="card-soft p-4">
            <h2 class="h5 mb-3">Change Password</h2>
            <div class="row g-3">
              <div class="col-md-4"><input type="password" class="form-control" placeholder="Current password" /></div>
              <div class="col-md-4"><input type="password" class="form-control" placeholder="New password" /></div>
              <div class="col-md-4"><input type="password" class="form-control" placeholder="Confirm new password" />
              </div>
            </div>
            <button class="btn btn-gradient btn-sm mt-3">Update Password</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>

</html>
