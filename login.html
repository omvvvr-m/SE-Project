<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Virtual Lab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="auth-body">
  <main class="auth-container">
    <section class="glass-card p-4 p-md-5 auth-card">
      <div class="text-center mb-4">
        <i class="bi bi-cpu-fill fs-2 text-primary"></i>
        <h1 class="h3 mt-2 mb-1">Virtual Lab System</h1>
        <p class="text-secondary mb-0">Login to your laboratory dashboard</p>
      </div>

      <form id="loginForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" id="username" class="form-control" required placeholder="Enter username" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-control" required
            placeholder="Enter password" />
        </div>
        <!-- <div class="mb-4">
          <label for="loginRole" class="form-label">Role</label>
          <select id="loginRole" class="form-select" required>
            <option value="researcher">Researcher / User</option>
            <option value="admin">Admin</option>
          </select>
        </div> -->

        <button type="submit" class="btn btn-gradient w-100 py-2">Login</button>
      </form>

      <p class="text-center mt-3 mb-0">
        New user?
        <a href="signup.html" class="text-primary text-decoration-none fw-semibold">Create account</a>
      </p>
    </section>
  </main>
  <script src="js/app.js?v=20260501"></script>
</body>

</html>
